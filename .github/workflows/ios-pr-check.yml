name: ios-full-check

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  ios-full-check:
    runs-on: macos-14
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Xcode Version
        run: xcodebuild -version

      - name: Run iOS/watchOS full checks
        run: bash scripts/ios_pr_check.sh

name: iOS PR Check

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ios-pr-check-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  project-check:
    runs-on: macos-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Resolve Swift Packages
        run: xcodebuild -project dogArea.xcodeproj -scheme dogArea -resolvePackageDependencies

      - name: Validate Shared Scheme and Build Settings
        run: |
          xcodebuild -list -project dogArea.xcodeproj
          xcodebuild -project dogArea.xcodeproj -scheme dogArea -showBuildSettings > /dev/null

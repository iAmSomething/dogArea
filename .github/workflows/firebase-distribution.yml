name: Firebase App Distribution

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      release_notes:
        description: Release notes for testers
        required: false
        default: ""

permissions:
  contents: read

concurrency:
  group: firebase-distribution-main
  cancel-in-progress: false

jobs:
  distribute:
    runs-on: macos-latest
    timeout-minutes: 60
    env:
      XCODE_PROJECT: dogArea.xcodeproj
      XCODE_SCHEME: dogArea
      DEFAULT_FIREBASE_APP_ID: "1:326179558500:ios:c8404bae2adc65046dbb71"
      DEFAULT_TESTER_GROUPS: tester
      DEFAULT_IOS_BUNDLE_ID: com.th.dogArea
      DEFAULT_WATCH_BUNDLE_ID: com.th.dogArea.watchkitapp
      DEFAULT_TEAM_ID: 7Y3Y9M4N4F

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Check Distribution Prerequisites
        env:
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
          IOS_DIST_CERT_P12_BASE64: ${{ secrets.IOS_DIST_CERT_P12_BASE64 }}
          IOS_DIST_CERT_PASSWORD: ${{ secrets.IOS_DIST_CERT_PASSWORD }}
          IOS_PROVISIONING_PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
        run: |
          echo "DISTRIBUTION_ENABLED=true" >> "$GITHUB_ENV"
          missing=()

          required=(
            FIREBASE_SERVICE_ACCOUNT_JSON
            IOS_DIST_CERT_P12_BASE64
            IOS_DIST_CERT_PASSWORD
            IOS_PROVISIONING_PROFILE_BASE64
          )

          for key in "${required[@]}"; do
            if [ -z "${!key}" ]; then
              missing+=("$key")
            fi
          done

          if [ "${#missing[@]}" -gt 0 ]; then
            echo "DISTRIBUTION_ENABLED=false" >> "$GITHUB_ENV"
            echo "MISSING_SECRETS=${missing[*]}" >> "$GITHUB_ENV"
            echo "::notice::Skipping distribution. Missing secrets: ${missing[*]}"
          fi

      - name: Resolve Runtime Configuration
        if: env.DISTRIBUTION_ENABLED == 'true'
        env:
          FIREBASE_APP_ID: ${{ vars.FIREBASE_APP_ID }}
          FIREBASE_TESTER_GROUPS: ${{ vars.FIREBASE_TESTER_GROUPS }}
          IOS_DEVELOPMENT_TEAM: ${{ vars.IOS_DEVELOPMENT_TEAM }}
          IOS_BUNDLE_ID: ${{ vars.IOS_BUNDLE_ID }}
          WATCH_BUNDLE_ID: ${{ vars.WATCH_BUNDLE_ID }}
        run: |
          echo "FIREBASE_APP_ID_VALUE=${FIREBASE_APP_ID:-$DEFAULT_FIREBASE_APP_ID}" >> "$GITHUB_ENV"
          echo "FIREBASE_TESTER_GROUPS_VALUE=${FIREBASE_TESTER_GROUPS:-$DEFAULT_TESTER_GROUPS}" >> "$GITHUB_ENV"
          echo "IOS_DEVELOPMENT_TEAM_VALUE=${IOS_DEVELOPMENT_TEAM:-$DEFAULT_TEAM_ID}" >> "$GITHUB_ENV"
          echo "IOS_BUNDLE_ID_VALUE=${IOS_BUNDLE_ID:-$DEFAULT_IOS_BUNDLE_ID}" >> "$GITHUB_ENV"
          echo "WATCH_BUNDLE_ID_VALUE=${WATCH_BUNDLE_ID:-$DEFAULT_WATCH_BUNDLE_ID}" >> "$GITHUB_ENV"

      - name: Prepare Firebase Credentials
        if: env.DISTRIBUTION_ENABLED == 'true'
        env:
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
        run: |
          FIREBASE_CREDENTIALS_PATH="$RUNNER_TEMP/firebase-service-account.json"
          printf '%s' "$FIREBASE_SERVICE_ACCOUNT_JSON" > "$FIREBASE_CREDENTIALS_PATH"
          echo "GOOGLE_APPLICATION_CREDENTIALS=$FIREBASE_CREDENTIALS_PATH" >> "$GITHUB_ENV"

      - name: Install Signing Certificate and Profiles
        if: env.DISTRIBUTION_ENABLED == 'true'
        env:
          IOS_DIST_CERT_P12_BASE64: ${{ secrets.IOS_DIST_CERT_P12_BASE64 }}
          IOS_DIST_CERT_PASSWORD: ${{ secrets.IOS_DIST_CERT_PASSWORD }}
          IOS_PROVISIONING_PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
          WATCH_PROVISIONING_PROFILE_BASE64: ${{ secrets.WATCH_PROVISIONING_PROFILE_BASE64 }}
          IOS_KEYCHAIN_PASSWORD: ${{ secrets.IOS_KEYCHAIN_PASSWORD }}
        run: |
          CERTIFICATE_PATH="$RUNNER_TEMP/dist-cert.p12"
          APP_PROFILE_PATH="$RUNNER_TEMP/app.mobileprovision"
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain-db"
          PROFILE_DIR="$HOME/Library/MobileDevice/Provisioning Profiles"

          echo "$IOS_DIST_CERT_P12_BASE64" | base64 --decode > "$CERTIFICATE_PATH"
          echo "$IOS_PROVISIONING_PROFILE_BASE64" | base64 --decode > "$APP_PROFILE_PATH"

          KEYCHAIN_PASSWORD="${IOS_KEYCHAIN_PASSWORD:-$(openssl rand -base64 24)}"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERTIFICATE_PATH" -P "$IOS_DIST_CERT_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | tr -d '"')
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          mkdir -p "$PROFILE_DIR"

          APP_PROFILE_UUID="$(security cms -D -i "$APP_PROFILE_PATH" | plutil -extract UUID raw -)"
          APP_PROFILE_NAME="$(security cms -D -i "$APP_PROFILE_PATH" | plutil -extract Name raw -)"
          cp "$APP_PROFILE_PATH" "$PROFILE_DIR/$APP_PROFILE_UUID.mobileprovision"

          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> "$GITHUB_ENV"
          echo "APP_PROFILE_NAME=$APP_PROFILE_NAME" >> "$GITHUB_ENV"

          if [ -n "$WATCH_PROVISIONING_PROFILE_BASE64" ]; then
            WATCH_PROFILE_PATH="$RUNNER_TEMP/watch.mobileprovision"
            echo "$WATCH_PROVISIONING_PROFILE_BASE64" | base64 --decode > "$WATCH_PROFILE_PATH"

            WATCH_PROFILE_UUID="$(security cms -D -i "$WATCH_PROFILE_PATH" | plutil -extract UUID raw -)"
            WATCH_PROFILE_NAME="$(security cms -D -i "$WATCH_PROFILE_PATH" | plutil -extract Name raw -)"
            cp "$WATCH_PROFILE_PATH" "$PROFILE_DIR/$WATCH_PROFILE_UUID.mobileprovision"

            echo "WATCH_PROFILE_NAME=$WATCH_PROFILE_NAME" >> "$GITHUB_ENV"
          fi

      - name: Resolve Swift Packages
        if: env.DISTRIBUTION_ENABLED == 'true'
        run: xcodebuild -project "$XCODE_PROJECT" -scheme "$XCODE_SCHEME" -resolvePackageDependencies

      - name: Archive iOS App
        if: env.DISTRIBUTION_ENABLED == 'true'
        run: |
          xcodebuild \
            -project "$XCODE_PROJECT" \
            -scheme "$XCODE_SCHEME" \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath "$RUNNER_TEMP/dogArea.xcarchive" \
            DEVELOPMENT_TEAM="$IOS_DEVELOPMENT_TEAM_VALUE" \
            SWIFT_ENABLE_EXPLICIT_MODULES=NO \
            OTHER_CODE_SIGN_FLAGS="--keychain $KEYCHAIN_PATH" \
            archive

      - name: Export IPA
        if: env.DISTRIBUTION_ENABLED == 'true'
        run: |
          EXPORT_OPTIONS_PLIST="$RUNNER_TEMP/ExportOptions.plist"
          WATCH_PROFILE_XML=""

          if [ -n "${WATCH_PROFILE_NAME:-}" ]; then
            WATCH_PROFILE_XML="<key>${WATCH_BUNDLE_ID_VALUE}</key><string>${WATCH_PROFILE_NAME}</string>"
          fi

          cat > "$EXPORT_OPTIONS_PLIST" <<PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>ad-hoc</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>teamID</key>
            <string>${IOS_DEVELOPMENT_TEAM_VALUE}</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>${IOS_BUNDLE_ID_VALUE}</key>
              <string>${APP_PROFILE_NAME}</string>
              ${WATCH_PROFILE_XML}
            </dict>
            <key>stripSwiftSymbols</key>
            <true/>
            <key>compileBitcode</key>
            <false/>
          </dict>
          </plist>
          PLIST

          xcodebuild \
            -exportArchive \
            -archivePath "$RUNNER_TEMP/dogArea.xcarchive" \
            -exportPath "$RUNNER_TEMP/export" \
            -exportOptionsPlist "$EXPORT_OPTIONS_PLIST"

          IPA_PATH="$(find "$RUNNER_TEMP/export" -name '*.ipa' | head -n 1)"
          if [ -z "$IPA_PATH" ]; then
            echo "::error::IPA was not generated during export."
            exit 1
          fi

          echo "IPA_PATH=$IPA_PATH" >> "$GITHUB_ENV"

      - name: Build Release Notes
        if: env.DISTRIBUTION_ENABLED == 'true'
        env:
          INPUT_RELEASE_NOTES: ${{ github.event.inputs.release_notes || '' }}
        run: |
          RELEASE_NOTES="$INPUT_RELEASE_NOTES"
          if [ -z "$RELEASE_NOTES" ]; then
            RELEASE_NOTES="$(git log -1 --pretty=format:'%h %s')"
          fi

          {
            echo "RELEASE_NOTES<<EOF"
            echo "$RELEASE_NOTES"
            echo "EOF"
          } >> "$GITHUB_ENV"

      - name: Upload to Firebase App Distribution
        if: env.DISTRIBUTION_ENABLED == 'true'
        run: |
          npx --yes firebase-tools appdistribution:distribute "$IPA_PATH" \
            --app "$FIREBASE_APP_ID_VALUE" \
            --groups "$FIREBASE_TESTER_GROUPS_VALUE" \
            --release-notes "$RELEASE_NOTES"

      - name: Upload IPA Artifact
        if: env.DISTRIBUTION_ENABLED == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: dogArea-ipa
          path: ${{ env.IPA_PATH }}
          if-no-files-found: ignore

      - name: Distribution Skipped
        if: env.DISTRIBUTION_ENABLED != 'true'
        run: |
          echo "Distribution skipped due to missing signing prerequisites."
          echo "Missing: ${MISSING_SECRETS:-unknown}"
